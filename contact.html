    <!-- Contact Section -->
    <section class="page-section reveal">
        <div class="container">
            <h1 class="page-title">Contact Me</h1>

            <div class="contact-wrapper">

                <!-- Contact Info -->
                <div class="contact-info">
                    <p><strong>Email:</strong> shivanandsinghthakur1@gmail.com</p>
                    <p><strong>Location:</strong> India</p>
                    <p><strong>GitHub:</strong> 
                        <a href="https://github.com/Shivanand-Thakur/" target="_blank">View Profile</a>
                    </p>
                    <p><strong>LinkedIn:</strong> 
                        <a href="https://www.linkedin.com/in/shivanand-thakur-/" target="_blank">Connect with me</a>
                    </p>
                </div>

                <!-- Netlify Form -->
                <form name="contact"
                      method="POST"
                      data-netlify="true"
                      class="contact-form"
                      onsubmit="handleSubmit(event)">

                    <!-- Required Hidden Field -->
                    <input type="hidden" name="form-name" value="contact">

                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

                    <button type="submit" class="btn primary">
                        Send Message
                    </button>

                </form>

            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Shivanand Thakur</p>
    </footer>

    <!-- Netlify Form + Alert Script -->
    <script>
function handleSubmit(event) {
    event.preventDefault();

    const form = event.target;

    // If running locally (file://)
    if (window.location.protocol === "file:") {
        alert("Message sent successfully! I will get back to you soon.");
        form.reset();
        return;
    }

    // If running on Netlify
    fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(new FormData(form)).toString()
    })
    .then(() => {
        alert("Message sent successfully! I will get back to you soon.");
        form.reset();
    })
    .catch(() => {
        alert("Something went wrong. Please try again.");
    });
}
</script>

    <!-- Main JS -->
    <script src="assets/js/script.js"></script>
